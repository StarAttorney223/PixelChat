<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelChat</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══ LOBBY ══ -->
<div id="lobby">
  <div class="lobby-card">
    <div class="sprite-row">
      <svg class="sprite sp1" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="0" width="6" height="6" fill="#00e5ff"/>
        <rect x="4" y="6" width="8" height="6" fill="#0099bb"/>
        <rect x="3" y="12" width="3" height="4" fill="#0099bb"/>
        <rect x="10" y="12" width="3" height="4" fill="#0099bb"/>
        <rect x="6" y="2" width="2" height="2" fill="#001a22"/>
        <rect x="9" y="2" width="2" height="2" fill="#001a22"/>
        <rect x="6" y="5" width="5" height="1" fill="#001a22"/>
        <rect x="2" y="7" width="2" height="4" fill="#0099bb"/>
        <rect x="12" y="7" width="2" height="4" fill="#0099bb"/>
      </svg>
      <svg class="sprite" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="0" width="6" height="6" fill="#ff00aa"/>
        <rect x="4" y="6" width="8" height="6" fill="#bb0077"/>
        <rect x="3" y="12" width="3" height="4" fill="#bb0077"/>
        <rect x="10" y="12" width="3" height="4" fill="#bb0077"/>
        <rect x="6" y="2" width="2" height="2" fill="#330011"/>
        <rect x="9" y="2" width="2" height="2" fill="#330011"/>
        <rect x="6" y="5" width="5" height="1" fill="#ffaadd"/>
        <rect x="2" y="7" width="2" height="4" fill="#bb0077"/>
        <rect x="12" y="7" width="2" height="4" fill="#bb0077"/>
      </svg>
      <svg class="sprite sp3" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="0" width="6" height="6" fill="#ffe600"/>
        <rect x="4" y="6" width="8" height="6" fill="#aa9900"/>
        <rect x="3" y="12" width="3" height="4" fill="#aa9900"/>
        <rect x="10" y="12" width="3" height="4" fill="#aa9900"/>
        <rect x="6" y="2" width="2" height="2" fill="#221a00"/>
        <rect x="9" y="2" width="2" height="2" fill="#221a00"/>
        <rect x="6" y="5" width="5" height="1" fill="#221a00"/>
        <rect x="2" y="7" width="2" height="4" fill="#aa9900"/>
        <rect x="12" y="7" width="2" height="4" fill="#aa9900"/>
      </svg>
    </div>

    <div class="lobby-logo">PIXEL<span style="color:var(--accent2)">CHAT</span></div>
    <div class="pixel-sub">&gt; MULTIPLAYER v2.0 <span class="blink">_</span></div>

    <div class="field-group">
      <label class="field-label">▶ PLAYER NAME</label>
      <input type="text" id="nameInput" placeholder="ENTER NAME..." maxlength="20" autocomplete="off">
    </div>
    <div class="field-group">
      <label class="field-label">▶ ROOM CODE</label>
      <input type="text" id="roomInput" placeholder="ENTER CODE..." maxlength="20" autocomplete="off" style="text-transform:uppercase">
    </div>

    <div id="lobbyError" class="error-msg"></div>

    <div style="margin-top:24px">
      <button class="btn btn-primary" onclick="joinRoom()">► JOIN ROOM</button>
      <button class="btn btn-secondary" onclick="createRoom()">+ CREATE NEW ROOM</button>
    </div>
    <div class="hp-bar"><div class="hp-fill"></div></div>
  </div>
</div>

<!-- ══ CHATROOM ══ -->
<div id="chatroom">
  <div class="chat-header">
    <button class="players-btn desktop-only" onclick="toggleSidebar()" style="display:none;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;margin-bottom:-2px;margin-right:2px"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>PLAYERS</button>

    <div class="header-left mobile-only">
      <button class="icon-btn players-icon-btn" onclick="toggleSidebar()" title="Players">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </button>
    </div>

    <div class="header-center desktop-only">
      <div class="pixel-logo">PIXEL<span style="color:var(--accent2)">CHAT</span></div>
      <div class="room-badge"><span class="roomCodeDisplayVal"></span><button class="copy-btn" onclick="copyRoomCode()" title="Copy room code">⎘</button></div>
    </div>

    <div class="pixel-logo mobile-only">PIXEL<span style="color:var(--accent2)">CHAT</span></div>

    <div class="header-right desktop-only">
      <button class="invite-btn" onclick="copyShareLink()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;margin-bottom:-2px;margin-right:2px"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>INVITE</button>
      <button class="leave-btn" onclick="leaveRoom()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;margin-bottom:-2px;margin-right:2px"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>QUIT</button>
    </div>

    <div class="header-right mobile-only">
      <button class="icon-btn invite-icon-btn" onclick="copyShareLink()" title="Invite">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </button>
      <button class="icon-btn quit-icon-btn" onclick="leaveRoom()" title="Quit">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
  </div>

  <div class="chat-body">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span style="display:flex;align-items:center"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;margin-right:6px;"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>PLAYERS IN ROOM</span>
        <button class="sidebar-close-btn" onclick="closeSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </div>
      <div class="sidebar-room-badge mobile-only">
        <span class="room-label">ROOM:</span>
        <span class="roomCodeDisplayVal"></span>
        <button class="copy-btn" onclick="copyRoomCode()" title="Copy room code">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
      </div>
      <div class="sidebar-status">
        <div class="online-count"><div class="px-dot"></div><span id="onlineCount">0</span>&nbsp;ONLINE</div>
        <div class="conn-pill connecting" id="connPill">CONNECTING</div>
      </div>
      <div class="user-list" id="userList"></div>
    </div>

    <div class="messages-area">
      <!--
        .new-msg-btn lives INSIDE .messages-list (added by JS into the flex scroll container).
        It uses position:sticky so it always hugs the bottom of the VISIBLE scroll viewport,
        never overlapping the typing-bar / input-area below.
      -->
      <div class="messages-list" id="messagesList"></div>

      <div class="typing-bar" id="typingBar"></div>

      <div class="media-preview-bar" id="mediaPreviewBar">
        <img class="preview-thumb" id="previewThumb" src="" alt="">
        <span class="preview-name" id="previewName"></span>
        <button class="preview-cancel" onclick="cancelMedia()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;margin-bottom:-3px;margin-right:2px"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>CANCEL</button>
      </div>

      <div class="reply-preview-bar" id="replyPreviewBar">
        <div class="reply-preview-content">
          <div class="reply-preview-author" id="replyPreviewAuthor"></div>
          <div class="reply-preview-text" id="replyPreviewText"></div>
        </div>
        <button class="reply-cancel-btn" onclick="cancelReply()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </div>

      <div class="edit-indicator" id="editIndicator">
        <div class="edit-indicator-content">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;flex-shrink:0"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
          EDITING MESSAGE
        </div>
        <button class="edit-cancel-btn" onclick="cancelEdit()" title="Cancel edit (Esc)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <div class="input-area">
        <input type="file" id="fileInput" accept="image/*,video/*,image/gif" onchange="onFileChosen(event)">
        <button class="media-btn" onclick="document.getElementById('fileInput').click()" title="Send image/video"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px;height:20px;"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg></button>
        <input class="msg-input" id="msgInput" placeholder="> TYPE MESSAGE..." autocomplete="off" maxlength="2000"
               onkeydown="handleKey(event)" oninput="onTyping()">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:12px;height:12px;margin-bottom:-2px;margin-left:2px"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script src="socket.js"></script>
<script src="ui.js"></script>
</body>
</html>
