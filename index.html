<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelChat</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0d0d1a;
    --bg2:     #12122a;
    --panel:   #1a1a35;
    --border:  #3a3a6a;
    --accent:  #00e5ff;
    --accent2: #ff00aa;
    --yellow:  #ffe600;
    --green:   #00ff88;
    --red:     #ff3355;
    --text:    #e0e0ff;
    --muted:   #5555aa;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: linear-gradient(135deg, #0a0a1a 0%, #12122a 100%);
    color:var(--text);
    font-family:'VT323',monospace;
    font-size:18px;
    height:100vh; height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 70% 60% at 20% 30%,rgba(0,229,255,.05) 0%,transparent 65%),
      radial-gradient(ellipse 50% 50% at 80% 70%,rgba(255,0,170,.04) 0%,transparent 65%);
    pointer-events:none; z-index:0;
  }

  /* ══════════════════════════════════════
     LOBBY
  ══════════════════════════════════════ */
  #lobby {
    display:flex; align-items:center; justify-content:center;
    height:100vh; height:100dvh; position:relative; z-index:1;
    padding:20px;
  }

  .lobby-card {
    background:var(--panel);
    padding:48px 44px;
    width:100%; max-width:540px;
    position:relative;
    border:4px solid var(--accent);
    box-shadow:10px 10px 0 rgba(0,229,255,.22), inset 2px 2px 0 rgba(255,255,255,.05), inset -2px -2px 0 rgba(0,0,0,.3);
  }
  .lobby-card::before {
    content:''; position:absolute; top:-4px; left:-4px; right:-4px; bottom:-4px;
    background:
      var(--bg) 0 0/12px 12px no-repeat,
      var(--bg) 100% 0/12px 12px no-repeat,
      var(--bg) 0 100%/12px 12px no-repeat,
      var(--bg) 100% 100%/12px 12px no-repeat;
    pointer-events:none;
  }

  .sprite-row { display:flex; justify-content:center; gap:14px; margin-bottom:28px; }
  .sprite { width:28px; height:28px; image-rendering:pixelated; }
  .sp1 { animation:bobble .8s step-end infinite; }
  .sp3 { animation:bobble 1.4s step-end infinite; }
  @keyframes bobble { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  .pixel-title {
    font-family:'Press Start 2P',monospace; font-size:clamp(18px,4vw,28px);
    color:var(--accent);
    text-shadow:4px 4px 0 rgba(0,229,255,.3),-1px -1px 0 #001a22;
    margin-bottom:8px; line-height:1.5;
  }
  .pixel-sub { font-size:clamp(16px,3vw,20px); color:var(--muted); margin-bottom:36px; letter-spacing:2px; }

  .blink { animation:blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .field-label {
    display:block; font-family:'Press Start 2P',monospace; font-size:clamp(7px,1.5vw,9px);
    color:var(--yellow); margin-bottom:10px; letter-spacing:1px;
    text-shadow:2px 2px 0 rgba(255,230,0,.3);
  }
  .field-group { margin-bottom:24px; }

  input[type=text] {
    width:100%; background:var(--bg2); border:3px solid var(--border);
    color:var(--green); font-family:'VT323',monospace; font-size:clamp(20px,3vw,26px);
    padding:12px 16px; outline:none; letter-spacing:2px;
    box-shadow:inset 3px 3px 0 rgba(0,0,0,.4);
    transition:border-color .1s;
  }
  input[type=text]:focus { border-color:var(--accent); box-shadow:inset 3px 3px 0 rgba(0,0,0,.4),0 0 0 2px rgba(0,229,255,.2); }
  input[type=text]::placeholder { color:var(--muted); }
  input[type=text]:disabled { opacity:.4; cursor:not-allowed; }

  .btn {
    width:100%; padding:14px; border:none; border-radius: 0px;
    font-family:'Press Start 2P',monospace; font-size:clamp(9px,1.8vw,11px);
    letter-spacing:1px; cursor:pointer;
    text-transform:uppercase; transition:all .1s ease;
  }
  .btn-primary {
    background:var(--accent); color:#000; border:none; margin-bottom:16px;
    box-shadow: 0 4px 0 #0099bb;
  }
  .btn-primary:hover { transform:scale(1.02); }
  .btn-primary:active { transform:translateY(4px) scale(1.02); box-shadow: 0 0 0 #0099bb; }

  .btn-secondary {
    background:transparent; color:var(--accent2); border:3px solid var(--accent2);
    box-shadow: 0 4px 0 #770055;
  }
  .btn-secondary:hover { transform:scale(1.02); }
  .btn-secondary:active { transform:translateY(4px) scale(1.02); box-shadow: 0 0 0 #770055; }

  .error-msg { color:var(--red); font-size:clamp(14px,2.5vw,18px); margin-top:10px; min-height:20px; letter-spacing:1px; }

  .hp-bar { height:8px; background:var(--bg); border:2px solid var(--border); margin-top:20px; overflow:hidden; }
  .hp-fill {
    height:100%;
    background:repeating-linear-gradient(90deg,var(--green) 0,var(--green) 6px,#004422 6px,#004422 8px);
    animation:hp-fill 1.2s steps(6) forwards; width:0;
  }
  @keyframes hp-fill { to{width:100%} }

  /* ══════════════════════════════════════
     CHATROOM
  ══════════════════════════════════════ */
  #chatroom { display:none; height:100vh; height:100dvh; flex-direction:column; position:relative; z-index:1; }

  /* HEADER */
  .chat-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 20px; background:var(--bg2);
    border-bottom:4px solid var(--border);
    flex-shrink:0; gap:10px; flex-wrap:wrap;
  }
  .header-center { display:flex; align-items:center; gap:14px; flex-wrap:wrap; flex:1; min-width:0; }

  .pixel-logo { font-family:'Press Start 2P',monospace; font-size:clamp(16px,2.5vw,22px); color:var(--accent); text-shadow:4px 4px 0 rgba(0,229,255,.3); white-space:nowrap; }

  .room-badge {
    background:var(--bg); border:3px solid var(--yellow);
    box-shadow:3px 3px 0 rgba(255,230,0,.2);
    padding:6px 12px; font-size:clamp(16px,2.5vw,22px); color:var(--yellow);
    display:flex; align-items:center; gap:8px; letter-spacing:2px; white-space:nowrap;
  }
  .copy-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:28px; font-family:'VT323',monospace; padding:0 2px; transition:color .1s; line-height:1; }
  .copy-btn:hover { color:var(--accent); transform:scale(1.2); }

  .online-count { display:flex; align-items:center; gap:8px; font-size:20px; color:var(--green); white-space:nowrap; }
  .px-dot { width:10px; height:10px; background:var(--green); flex-shrink:0; animation:blink 1.2s step-end infinite; }

  .conn-pill {
    font-family:'Press Start 2P',monospace; font-size:clamp(6px,1vw,8px);
    padding:5px 9px; border:2px solid; letter-spacing:1px; white-space:nowrap;
  }
  .conn-pill.connected    { color:var(--green);  border-color:var(--green); }
  .conn-pill.connecting   { color:var(--yellow); border-color:var(--yellow); animation:blink .5s step-end infinite; }
  .conn-pill.disconnected { color:var(--red);    border-color:var(--red); }

  .header-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }

  .leave-btn {
    background:rgba(255,51,85,0.05); border:3px solid #ff3355; color:var(--red);
    font-family:'Press Start 2P',monospace; font-size:clamp(7px,1.2vw,9px);
    padding:9px 14px; cursor:pointer; border-radius:6px;
    letter-spacing:1px; transition:all .2s ease; white-space:nowrap; flex-shrink:0;
  }
  .leave-btn:hover { transform:scale(1.05); box-shadow:0 0 10px rgba(255,51,85,0.6); border-color:var(--red); }
  .leave-btn:active { transform:scale(0.98); }

  /* BODY */
  .chat-body { display:flex; flex:1; overflow:hidden; }

  /* SIDEBAR */
  .sidebar {
    width:38%; min-width:300px; max-width:440px; background:var(--bg2);
    border-right:4px solid var(--border);
    display:flex; flex-direction:column; flex-shrink:0; overflow:hidden;
    transition:width .2s;
  }
  .sidebar-header {
    padding:14px 14px 12px;
    font-family:'Press Start 2P',monospace; font-size:8px; color:var(--accent2);
    border-bottom:3px solid var(--border); letter-spacing:1px;
    text-shadow:2px 2px 0 rgba(255,0,170,.3);
    display:flex; align-items:center; justify-content:space-between;
  }
  .sidebar-close-btn {
    display:none; background:none; border:none; color:var(--muted);
    font-family:'Press Start 2P',monospace; font-size:8px; cursor:pointer;
  }
  .sidebar-status {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px 8px;
    border-bottom:2px solid var(--border);
    background:var(--bg);
  }

  .user-list { flex:1; overflow-y:auto; padding:10px 8px; scrollbar-width:none; }
  .user-list::-webkit-scrollbar { display:none; }

  .user-item { display:flex; align-items:center; gap:10px; padding:10px 10px; border:2px solid transparent; margin-bottom:6px; transition:all .08s; cursor:default; }
  .user-item:hover { background:rgba(255,255,255,.03); border-color:var(--border); }
  .user-item.is-me { background:rgba(0,229,255,.06); border-color:var(--accent); box-shadow:2px 2px 0 rgba(0,229,255,.15); }

  .avatar { width:40px; height:40px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Press Start 2P',monospace; font-size:14px; border:2px solid currentColor; box-shadow:2px 2px 0 rgba(0,0,0,.5); }
  .user-info { min-width:0; }
  .user-name { font-size:22px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-uid  { display:none; }
  .me-tag { font-family:'Press Start 2P',monospace; font-size:6px; background:var(--accent); color:#000; padding:3px 5px; margin-left:auto; flex-shrink:0; }

  /* MESSAGES
     messages-area is a flex column: [messages-list flex:1] [typing-bar] [bars] [input-area]
     The new-msg-btn is absolute inside messages-list (the scrollable region),
     so it always floats above the last message, never over the input row.
  */
  .messages-area { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); min-width:0; }

  /* The scrollable list is position:relative so the button can anchor to it */
  .messages-list {
    flex:1; overflow-y:auto; padding:20px 22px;
    display:flex; flex-direction:column; gap:2px;
    scrollbar-width:thin; scrollbar-color:var(--border) transparent;
    position:relative; /* anchor for .new-msg-btn */
  }

  .sys-msg { text-align:center; font-size:16px; color:var(--muted); padding:10px 0; letter-spacing:2px; display:flex; align-items:center; gap:10px; }
  .sys-msg::before,.sys-msg::after { content:''; flex:1; height:2px; background:repeating-linear-gradient(90deg,var(--border) 0,var(--border) 4px,transparent 4px,transparent 8px); }

  .msg-group { margin:8px 0; opacity:0; transform:translateY(10px); animation:msg-enter 0.25s ease-out forwards; }
  @keyframes msg-enter { to{opacity:1; transform:translateY(0)} }

  .msg-meta { display:flex; align-items:center; gap:10px; margin-bottom:5px; flex-wrap:wrap; }
  .msg-author { font-family:'Press Start 2P',monospace; font-size:10px; letter-spacing:.5px; }
  .msg-uid-tag { display:none; }
  .msg-time { color:var(--muted); font-size:16px; margin-left:auto; letter-spacing:1px; }

  .bubble { background:var(--user-bg, rgba(26,26,53,0.6)); border:2px solid var(--user-color, rgba(0,229,255,0.25)); border-radius:8px; padding:11px 16px; font-size:24px; line-height:1.45; word-break:break-word; max-width:min(620px,90%); display:inline-block; transition:all 0.2s ease; }
  .msg-group .bubble:hover { box-shadow:0 0 12px var(--user-color, rgba(0,229,255,.15)); }

  .bubble img, .bubble video {
    display:block; max-width:100%; max-height:340px;
    border:2px solid var(--border); margin-top:4px;
    image-rendering:auto;
  }
  .bubble video { width:100%; }
  .media-name { font-size:14px; color:var(--muted); margin-bottom:6px; letter-spacing:1px; display:block; }

  .msg-group.self { align-items:flex-end; display:flex; flex-direction:column; }
  .msg-group.self .msg-meta { flex-direction:row-reverse; }

  /* ── NEW MESSAGES BUTTON ──
     Anchored to .messages-list (position:relative).
     sticky: always visible at the bottom of the visible scroll area.
     pointer-events only on the button itself, doesn't block messages.
     Sits INSIDE the scroll container so it is never on top of the input row.
  */
  .new-msg-btn {
    display: none;
    position: sticky;  /* sticks to bottom of the visible messages-list viewport */
    bottom: 12px;
    /* center horizontally without absolute */
    align-self: center;
    z-index: 50;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 0;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 10px 18px;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 4px 4px 0 rgba(0,229,255,.35);
    white-space: nowrap;
    /* keep it out of the normal flex flow so it doesn't push messages up */
    margin-top: auto;
  }
  .new-msg-btn.visible {
    display: block;
    animation: btn-pop .15s steps(2) forwards;
  }
  @keyframes btn-pop {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* TYPING INDICATOR */
  .typing-bar {
    padding:6px 22px;
    font-size:17px; color:var(--accent2);
    background:var(--bg);
    min-height:30px;
    letter-spacing:1px;
    display:flex; align-items:center; gap:8px;
    border-top:2px solid var(--border);
    flex-shrink:0;
  }
  .typing-dots span {
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background:var(--accent2); margin:0 2px;
    animation:smooth-tdot 1.4s infinite ease-in-out both;
  }
  .typing-dots span:nth-child(2) { animation-delay:.2s; }
  .typing-dots span:nth-child(3) { animation-delay:.4s; }
  @keyframes smooth-tdot { 0%,80%,100%{opacity:0.3; transform:scale(0.8)} 40%{opacity:1; transform:scale(1.1)} }

  /* INPUT */
  .input-area { padding:12px 18px; border-top:1px solid rgba(255,255,255,0.05); display:flex; gap:10px; align-items:center; flex-shrink:0; }

  #fileInput { display:none; }

  .media-btn {
    background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:var(--muted); width:48px; height:48px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:all .2s ease;
  }
  .media-btn:hover { border-color:var(--accent2); color:var(--accent2); transform:scale(1.05); box-shadow:0 0 15px rgba(255,0,170,.2); }

  .msg-input { flex:1; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:var(--green); font-family:'VT323',monospace; font-size:26px; padding:10px 16px; outline:none; letter-spacing:1px; transition:all 0.2s ease; min-width:0; }
  .msg-input:focus { border-color:var(--accent); box-shadow:0 0 10px rgba(0,229,255,.15); }
  .msg-input::placeholder { color:var(--muted); }
  .msg-input:disabled { opacity:.4; cursor:not-allowed; }

  .send-btn { background:var(--accent); color:#000; border:none; border-radius:6px; font-family:'Press Start 2P',monospace; font-size:11px; padding:12px 16px; cursor:pointer; transition:all .2s ease; white-space:nowrap; font-weight:bold; }
  .send-btn:hover { transform:scale(1.05); box-shadow:0 0 15px rgba(0,229,255,.4); }
  .send-btn:active { transform:scale(0.95); }
  .send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

  /* media preview */
  .media-preview-bar {
    display:none; padding:8px 18px; background:var(--panel);
    border-top:2px solid var(--border);
    align-items:center; gap:10px; flex-shrink:0;
  }
  .media-preview-bar.show { display:flex; }
  .preview-thumb { max-height:60px; max-width:80px; border:2px solid var(--border); object-fit:cover; }
  .preview-name { font-size:16px; color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .preview-cancel { background:none; border:none; color:var(--red); font-size:20px; cursor:pointer; font-family:'VT323',monospace; }

  /* mobile sidebar overlay */
  .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; }
  .sidebar-overlay.show { display:block; }

  .players-btn {
    display:none; background:var(--bg); border:3px solid var(--accent2); color:var(--accent2);
    font-family:'Press Start 2P',monospace; font-size:7px;
    padding:7px 10px; cursor:pointer; letter-spacing:1px;
    box-shadow:3px 3px 0 #550033; white-space:nowrap;
  }

  /* TOAST */
  .toast { position:fixed; bottom:20px; right:20px; background:var(--bg2); border:3px solid var(--green); box-shadow:4px 4px 0 rgba(0,255,136,.2); color:var(--green); font-size:16px; padding:10px 16px; letter-spacing:2px; opacity:0; transform:translateY(8px); transition:all .15s steps(3); z-index:9998; pointer-events:none; }
  .toast.show { opacity:1; transform:translateY(0); }

  .share-link-btn { font-size:17px; margin-left:2px; }
  .share-link-btn:hover { color:var(--yellow) !important; }
  .invite-btn {
    background:rgba(255,0,170,0.05); border:3px solid #ff00aa; color:var(--accent2);
    font-family:'Press Start 2P',monospace; font-size:clamp(7px,1vw,9px);
    padding:9px 14px; cursor:pointer; border-radius:6px;
    letter-spacing:1px; transition:all .2s ease; white-space:nowrap; flex-shrink:0;
  }
  .invite-btn:hover { transform:scale(1.05); box-shadow:0 0 10px rgba(255,0,170,0.6); border-color:var(--accent2); }
  .invite-btn:active { transform:scale(0.98); }

  /* ── REPLY FEATURE ── */
  .reply-preview-bar {
    display:none; padding:8px 18px; background:var(--panel);
    border-top:2px solid var(--border); border-left:4px solid var(--accent);
    align-items:center; gap:10px; flex-shrink:0;
  }
  .reply-preview-bar.show { display:flex; }
  .reply-preview-content { flex:1; min-width:0; }
  .reply-preview-author {
    font-family:'Press Start 2P',monospace; font-size:7px;
    margin-bottom:3px; letter-spacing:.5px;
  }
  .reply-preview-text {
    font-size:16px; color:var(--muted);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .reply-cancel-btn {
    background:none; border:none; color:var(--red);
    font-size:20px; cursor:pointer; font-family:'VT323',monospace; flex-shrink:0;
  }

  /* Reply quote inside bubble */
  .reply-quote {
    background:rgba(255,255,255,0.03); border-left:2px solid var(--accent);
    padding:6px 10px; margin-bottom:8px; display:block; border-radius:2px 6px 6px 2px;
    transition:background .2s ease;
  }
  .reply-quote:hover { background:rgba(255,255,255,0.06); }
  .reply-quote-author {
    font-family:'Press Start 2P',monospace; font-size:7px;
    display:block; margin-bottom:3px;
  }
  .reply-quote-text {
    font-size:16px; color:var(--muted);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    display:block; max-width:500px;
  }

  .msg-actions {
    display:flex; gap:6px; align-items:center;
    margin-top:4px; opacity:0; transition:opacity .15s;
  }
  .msg-group:hover .msg-actions { opacity:1; }
  .msg-actions:has(.active) { opacity:1; }
  .msg-action-btn {
    background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.1);
    color:var(--muted); font-family:'VT323',monospace; border-radius:6px;
    font-size:15px; padding:2px 8px; cursor:pointer;
    transition:all .2s ease; letter-spacing:1px;
    display: flex; align-items: center;
  }
  .msg-action-btn:hover { border-color:var(--accent); color:var(--accent); box-shadow:0 0 10px rgba(0,229,255,.2); transform:scale(1.02); }
  .msg-action-btn.edit-btn:hover { border-color:var(--yellow); color:var(--yellow); box-shadow:0 0 10px rgba(255,230,0,.2); }
  .msg-action-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,.08); }
  .msg-action-btn.edit-btn.active { border-color:var(--yellow); color:var(--yellow); background:rgba(255,230,0,.08); }

  .msg-input.editing {
    border-color:var(--yellow) !important;
    box-shadow:inset 3px 3px 0 rgba(0,0,0,.4), 0 0 0 2px rgba(255,230,0,.2) !important;
  }

  /* ── EDIT INDICATOR BAR ── */
  .edit-indicator {
    display:none; padding:8px 18px; background:var(--panel);
    border-top:2px solid var(--border); border-left:4px solid var(--yellow);
    align-items:center; gap:10px; flex-shrink:0;
  }
  .edit-indicator.show { display:flex; }
  .edit-indicator-content {
    flex:1; display:flex; align-items:center; gap:8px;
    font-family:'Press Start 2P',monospace; font-size:7px;
    color:var(--yellow); letter-spacing:1px;
  }
  .edit-cancel-btn {
    background:none; border:none; color:var(--red);
    font-size:20px; cursor:pointer; font-family:'VT323',monospace;
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    transition:transform .15s, color .15s;
  }
  .edit-cancel-btn:hover { color:var(--red); transform:scale(1.15); }

<script>
// ── CONFIG ────────────────────────────────────
// const WS_URL = "ws://localhost:3001";  // local dev
const WS_URL = "wss://pixelchat-535b.onrender.com"; // deployed
// ─────────────────────────────────────────────

const COLORS    = ["#00e5ff","#ff00aa","#ffe600","#00ff88","#ff3355","#cc88ff","#ff8800","#88ffee"];
const BG_COLORS = ["#003344","#330022","#332200","#003322","#330011","#220033","#331a00","#002222"];

function getPlayerTheme(uid, colorIdx) {
  if (uid === myUID) return { fg: COLORS[0], bg: BG_COLORS[0] };
  let idx = colorIdx || 0;
  if (idx === 0) {
    let hash = 0;
    for(let i=0; i<uid.length; i++) hash += uid.charCodeAt(i);
    idx = (hash % (COLORS.length - 1)) + 1;
  }
  return { fg: COLORS[idx], bg: BG_COLORS[idx] };
}

let ws           = null;
let myUID        = null;
let myName       = null;
let currentRoom  = null;
let lastMsgUID   = null;
let reconnTimer  = null;
let pendingJoin  = null;

let typingTimer  = null;
let amTyping     = false;
const typingUsers = {};

let pendingMedia = null;
let replyingTo   = null;
let editingMsgId = null;

const msgStore = {};

// ── SCROLL STATE ──────────────────────────────
let userScrolledUp = false;

function isNearBottom() {
  const list = document.getElementById('messagesList');
  return list.scrollHeight - list.scrollTop - list.clientHeight < 100;
}

// The button is injected as a sticky child of #messagesList so it
// always appears above the last message, never over the input row.
// We create it once and reuse it throughout the session.
let _newMsgBtnEl = null;
function _getNewMsgBtn() {
  if (!_newMsgBtnEl) {
    _newMsgBtnEl = document.getElementById('newMsgBtn');
  }
  return _newMsgBtnEl;
}

function showNewMsgBtn() { _getNewMsgBtn().classList.add('visible'); }
function hideNewMsgBtn() { _getNewMsgBtn().classList.remove('visible'); }

function onNewMsgBtnClick() {
  hideNewMsgBtn();
  userScrolledUp = false;
  scrollToBottom();
}

// ── LOBBY ─────────────────────────────────────
function createRoom() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return showError("!! ENTER PLAYER NAME FIRST");
  const w = ['NOVA','ECHO','ZETA','LYRA','FLUX','VEGA','NEON','APEX','BYTE','KERN'];
  const code = w[Math.floor(Math.random()*w.length)] + '-' + Math.floor(10+Math.random()*90);
  document.getElementById('roomInput').value = code;
  doJoin(name, code);
}

function joinRoom() {
  const name = document.getElementById('nameInput').value.trim();
  const code = document.getElementById('roomInput').value.trim().toUpperCase();
  if (!name) return showError("!! ENTER YOUR NAME");
  if (!code) return showError("!! ENTER ROOM CODE");
  doJoin(name, code);
}

function doJoin(name, code) {
  showError('');
  pendingJoin = { name, code };
  sessionStorage.setItem('pixelchat_name', name);
  sessionStorage.setItem('pixelchat_room', code);
  openWS(name, code);
}

// ── WEBSOCKET ─────────────────────────────────
function openWS(name, code) {
  if (ws) { ws.onclose = null; ws.onerror = null; ws.close(); ws = null; }
  setConn('connecting');
  setInputEnabled(false);
  try { ws = new WebSocket(WS_URL); }
  catch(e) { return showError("!! CANNOT CONNECT TO SERVER"); }

  ws.onopen = () => {
    setConn('connected');
    ws.send(JSON.stringify({ type:'join', name, room:code }));
  };
  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    onMsg(msg);
  };
  ws.onclose = () => {
    setConn('disconnected');
    setInputEnabled(false);
    if (currentRoom && pendingJoin) {
      clearTimeout(reconnTimer);
      reconnTimer = setTimeout(() => openWS(pendingJoin.name, pendingJoin.code), 2500);
    }
  };
  ws.onerror = () => {};
}

function onMsg(msg) {
  if (msg.type === 'welcome') {
    myUID = msg.uid; myName = msg.name; currentRoom = msg.room;
    document.getElementById('lobby').style.display    = 'none';
    document.getElementById('chatroom').style.display = 'flex';
    document.querySelectorAll('.roomCodeDisplayVal').forEach(el => el.textContent = msg.room);
    document.getElementById('messagesList').innerHTML = '';
    lastMsgUID = null;
    userScrolledUp = false;

    // Inject the sticky "New Messages" button as the last child of the
    // scroll container. position:sticky + bottom:12px means it always
    // hugs the bottom of the VISIBLE list area, never the input row.
    const list = document.getElementById('messagesList');
    if (!document.getElementById('newMsgBtn')) {
      const btn = document.createElement('button');
      btn.className = 'new-msg-btn';
      btn.id = 'newMsgBtn';
      btn.textContent = '↓ NEW MESSAGES';
      btn.onclick = onNewMsgBtnClick;
      list.appendChild(btn);
    }
    _newMsgBtnEl = document.getElementById('newMsgBtn');

    (msg.history || []).forEach(appendMsg);
    setInputEnabled(true);
    document.getElementById('msgInput').focus();

    list.addEventListener('scroll', () => {
      if (isNearBottom()) {
        userScrolledUp = false;
        hideNewMsgBtn();
      } else {
        userScrolledUp = true;
      }
    }, { passive: true });

  } else if (msg.type === 'user_list') {
    renderUsers(msg.users);

  } else if (msg.type === 'message') {
    appendMsg(msg.msg);

  } else if (msg.type === 'edit') {
    applyEdit(msg);

  } else if (msg.type === 'typing') {
    handleTypingEvent(msg);
  }
}

// ── SCROLL TO BOTTOM (mobile-safe) ────────────────────────────────────────
// Two-pass strategy:
//   Pass 1 — double rAF: fires after the browser's next paint, ensuring the
//             new message node is in the DOM and its height is known.
//   Pass 2 — 200 ms setTimeout: catches secondary reflow from bars collapsing.
//
// On mobile: instant scrollTop (avoids iOS/Android smooth-scroll cutoff bug).
// On desktop: smooth scrollTo.
// +4 px buffer covers sub-pixel rounding in Android WebViews.
function scrollToBottom() {
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  const list     = document.getElementById('messagesList');

  function doScroll() {
    // scrollHeight already accounts for the sticky button height since it
    // is a child of the flex container. +4 for sub-pixel safety.
    const target = list.scrollHeight + 4;
    if (isMobile) {
      list.scrollTop = target;
    } else {
      list.scrollTo({ top: target, behavior: 'smooth' });
    }
  }

  requestAnimationFrame(() => {
    requestAnimationFrame(doScroll);
  });

  // Second pass: catches reflow after reply/edit bars collapse (150→200ms
  // gives a little more headroom on slow Android devices)
  setTimeout(doScroll, 200);
}

// ── SEND TEXT ─────────────────────────────────
function sendMessage() {
  if (pendingMedia) { sendMedia(); return; }

  const inp  = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text) return;

  // EDIT MODE — update in-place, no scroll needed
  if (editingMsgId) {
    if (!ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type:'edit', msgId: editingMsgId, text }));
    inp.value = '';
    cancelEdit();
    stopTyping();
    return;
  }

  if (!ws || ws.readyState !== 1) return;
  inp.value = '';
  stopTyping();

  const payload = { type:'chat', text };
  if (replyingTo) {
    payload.replyTo = replyingTo;
    cancelReply();
  }
  ws.send(JSON.stringify(payload));

  // Own message: ALWAYS scroll to bottom regardless of scroll position.
  userScrolledUp = false;
  hideNewMsgBtn();
  scrollToBottom();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  if (e.key === 'Escape') { cancelEdit(); cancelReply(); }
}

// ── TYPING ────────────────────────────────────
function onTyping() {
  if (!ws || ws.readyState !== 1) return;
  if (!amTyping) {
    amTyping = true;
    ws.send(JSON.stringify({ type:'typing', isTyping:true }));
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(stopTyping, 2000);
}

function stopTyping() {
  if (!amTyping) return;
  amTyping = false;
  clearTimeout(typingTimer);
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type:'typing', isTyping:false }));
}

function handleTypingEvent({ uid, name, isTyping }) {
  if (isTyping) typingUsers[uid] = name;
  else delete typingUsers[uid];
  renderTypingBar();
}

function renderTypingBar() {
  const bar = document.getElementById('typingBar');
  const names = Object.values(typingUsers);
  if (!names.length) { bar.innerHTML = ''; return; }
  const who = names.length === 1 ? names[0]
    : names.length === 2 ? `${names[0]} & ${names[1]}`
    : `${names[0]} & ${names.length-1} OTHERS`;
  const verb = names.length === 1 ? 'IS TYPING' : 'ARE TYPING';
  bar.innerHTML = `<span style="color:var(--accent2)">${esc(who)}</span>&nbsp;${verb}<span class="typing-dots"><span></span><span></span><span></span></span>`;
}

// ── REPLY ─────────────────────────────────────
function startReply(msgId) {
  if (replyingTo && replyingTo.msgId === msgId) { cancelReply(); return; }
  const m = msgStore[msgId];
  if (!m) return;
  document.querySelectorAll('.reply-btn.active').forEach(b => b.classList.remove('active'));
  replyingTo = { msgId, uid: m.uid, name: m.name, text: m.text, colorIdx: m.colorIdx };
  const theme = getPlayerTheme(m.uid, m.colorIdx);
  document.getElementById('replyPreviewAuthor').textContent = '↩ ' + m.name;
  document.getElementById('replyPreviewAuthor').style.color = theme.fg;
  document.getElementById('replyPreviewText').textContent = m.text || '[media]';
  document.getElementById('replyPreviewBar').classList.add('show');
  const grp = document.querySelector(`[data-msg-id="${msgId}"]`);
  if (grp) grp.querySelector('.reply-btn')?.classList.add('active');
  document.getElementById('msgInput').focus();
}

function cancelReply() {
  if (replyingTo) {
    const grp = document.querySelector(`[data-msg-id="${replyingTo.msgId}"]`);
    if (grp) grp.querySelector('.reply-btn')?.classList.remove('active');
  }
  replyingTo = null;
  document.getElementById('replyPreviewBar').classList.remove('show');
  document.getElementById('replyPreviewAuthor').textContent = '';
  document.getElementById('replyPreviewText').textContent = '';
}

// ── EDIT ──────────────────────────────────────
function startEdit(msgId) {
  const m = msgStore[msgId];
  if (!m || m.uid !== myUID) return;
  if (editingMsgId === msgId) { cancelEdit(); return; }
  document.querySelectorAll('.edit-btn.active').forEach(b => b.classList.remove('active'));
  editingMsgId = msgId;
  const inp = document.getElementById('msgInput');
  inp.value = m.text;
  inp.classList.add('editing');
  document.getElementById('editIndicator').classList.add('show');
  const grp = document.querySelector(`[data-msg-id="${msgId}"]`);
  if (grp) grp.querySelector('.edit-btn')?.classList.add('active');
  inp.focus();
  inp.setSelectionRange(inp.value.length, inp.value.length);
}

function cancelEdit() {
  if (!editingMsgId) return;
  const grp = document.querySelector(`[data-msg-id="${editingMsgId}"]`);
  if (grp) grp.querySelector('.edit-btn')?.classList.remove('active');
  editingMsgId = null;
  const inp = document.getElementById('msgInput');
  inp.value = '';
  inp.classList.remove('editing');
  document.getElementById('editIndicator').classList.remove('show');
}

function applyEdit({ msgId, text }) {
  const m = msgStore[msgId];
  if (!m) return;
  m.text = text;
  const bubble = m.el.querySelector('.bubble');
  if (bubble && !bubble.querySelector('img') && !bubble.querySelector('video')) {
    const existingTag = bubble.querySelector('.edited-tag');
    if (existingTag) existingTag.remove();
    bubble.textContent = text;
    const tag = document.createElement('span');
    tag.className = 'edited-tag';
    tag.textContent = '(edited)';
    bubble.appendChild(tag);
  }
}

// ── MEDIA ─────────────────────────────────────
function onFileChosen(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 6 * 1024 * 1024) { showToast('!! FILE TOO LARGE (MAX 6MB)'); e.target.value=''; return; }

  const reader = new FileReader();
  reader.onload = (ev) => {
    const dataUrl = ev.target.result;
    pendingMedia = { dataUrl, mediaType: file.type, fileName: file.name };
    const bar = document.getElementById('mediaPreviewBar');
    const thumb = document.getElementById('previewThumb');
    document.getElementById('previewName').textContent = file.name;
    if (file.type.startsWith('image/') || file.type === 'image/gif') {
      thumb.src = dataUrl; thumb.style.display = 'block';
    } else { thumb.style.display = 'none'; }
    bar.classList.add('show');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function cancelMedia() {
  pendingMedia = null;
  document.getElementById('mediaPreviewBar').classList.remove('show');
  document.getElementById('previewThumb').src = '';
}

function sendMedia() {
  if (!pendingMedia || !ws || ws.readyState !== 1) return;
  const payload = { type:'media', ...pendingMedia };
  if (replyingTo) { payload.replyTo = replyingTo; cancelReply(); }
  ws.send(JSON.stringify(payload));
  cancelMedia();
  // Own media send: always scroll to bottom
  userScrolledUp = false;
  hideNewMsgBtn();
  scrollToBottom();
}

// ── LEAVE ─────────────────────────────────────
function leaveRoom() {
  clearTimeout(reconnTimer);
  pendingJoin = null; currentRoom = null;
  sessionStorage.removeItem('pixelchat_name');
  sessionStorage.removeItem('pixelchat_room');
  if (ws) { ws.onclose = null; ws.onerror = null; ws.close(); ws = null; }
  stopTyping(); cancelMedia(); cancelReply(); cancelEdit();
  document.getElementById('chatroom').style.display = 'none';
  document.getElementById('lobby').style.display    = 'flex';
  document.getElementById('messagesList').innerHTML = '';
  document.getElementById('userList').innerHTML     = '';
  document.getElementById('onlineCount').textContent = '0';
  document.getElementById('typingBar').innerHTML    = '';
  lastMsgUID = null;
  userScrolledUp = false;
  _newMsgBtnEl = null;
  Object.keys(typingUsers).forEach(k => delete typingUsers[k]);
  Object.keys(msgStore).forEach(k => delete msgStore[k]);
  closeSidebar();
}

// ── RENDER USERS ──────────────────────────────
function renderUsers(users) {
  document.getElementById('onlineCount').textContent = users.length;
  const list = document.getElementById('userList');
  list.innerHTML = '';
  [...users].sort((a,b) => a.joinedAt - b.joinedAt).forEach(u => {
    const isMe = u.uid === myUID;
    const theme = getPlayerTheme(u.uid, u.colorIdx);
    const fg = theme.fg;
    const bg = theme.bg;
    const d = document.createElement('div');
    d.className = 'user-item' + (isMe ? ' is-me' : '');
    d.innerHTML = `
      <div class="avatar" style="color:${fg};background:${bg}">${u.name[0]}</div>
      <div class="user-info">
        <div class="user-name" style="color:${fg}">${esc(u.name)}</div>
        <div class="user-uid">#${u.uid}</div>
      </div>
      ${isMe ? '<span class="me-tag">YOU</span>' : ''}
    `;
    list.appendChild(d);
  });
}

// ── RENDER MESSAGE ────────────────────────────
function appendMsg(m) {
  const list = document.getElementById('messagesList');

  // Ensure the sticky button stays as the last child after every append
  const btn = document.getElementById('newMsgBtn');

  if (m.type === 'system') {
    const el = document.createElement('div');
    el.className = 'sys-msg'; el.textContent = m.text;
    // Insert before the sticky button so button stays last
    if (btn) list.insertBefore(el, btn); else list.appendChild(el);
    lastMsgUID = null;
    if (!userScrolledUp) scrollToBottom();
    return;
  }

  const isSelf = m.uid === myUID;
  const msgId = m.msgId || (m.uid + '_' + m.ts);
  const grp = document.createElement('div');

  const theme = getPlayerTheme(m.uid, m.colorIdx);
  const fgColor = theme.fg;
  const bgColor = theme.bg;

  grp.className = 'msg-group' + (isSelf ? ' self' : '');
  grp.dataset.msgId = msgId;
  grp.style.setProperty('--user-color', fgColor);
  grp.style.setProperty('--user-bg', bgColor);

  if (m.uid !== lastMsgUID) {
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.innerHTML = `
      <span class="msg-author" style="color:${fgColor}">${esc(m.name)}</span>
      <span class="msg-uid-tag">#${m.uid}</span>
      <span class="msg-time">${fmtTime(m.ts)}</span>
    `;
    grp.appendChild(meta);
  }

  const b = document.createElement('div');
  b.className = 'bubble';

  if (m.replyTo) {
    const rTheme = getPlayerTheme(m.replyTo.uid, m.replyTo.colorIdx);
    const fg = rTheme.fg;
    const q = document.createElement('div');
    q.className = 'reply-quote';
    q.innerHTML = `<span class="reply-quote-author" style="color:${fg}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:10px;height:10px;margin-right:2px;margin-bottom:-1px"><polyline points="9 14 4 9 9 4"></polyline><path d="M20 20v-7a4 4 0 0 0-4-4H4"></path></svg> ${esc(m.replyTo.name)}</span><span class="reply-quote-text">${esc(m.replyTo.text || '[media]')}</span>`;
    q.style.cursor = 'pointer';
    q.onclick = () => scrollToMsg(m.replyTo.msgId);
    b.appendChild(q);
  }

  if (m.type === 'media') {
    const nameEl = document.createElement('span');
    nameEl.className = 'media-name';
    nameEl.textContent = ' ';
    const svgIcon = document.createElement('span');
    svgIcon.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px;margin-bottom:-2px;margin-right:4px"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>`;
    nameEl.appendChild(svgIcon);
    nameEl.appendChild(document.createTextNode(m.fileName));
    b.appendChild(nameEl);
    if (m.mediaType.startsWith('image/') || m.mediaType === 'image/gif') {
      const img = document.createElement('img');
      img.src = m.dataUrl; img.alt = m.fileName; img.loading = 'lazy';
      b.appendChild(img);
    } else if (m.mediaType.startsWith('video/')) {
      const vid = document.createElement('video');
      vid.src = m.dataUrl; vid.controls = true; vid.preload = 'metadata';
      b.appendChild(vid);
    }
  } else {
    const textNode = document.createElement('span');
    textNode.textContent = m.text;
    b.appendChild(textNode);
  }

  grp.appendChild(b);

  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  actions.innerHTML = `<button class="msg-action-btn reply-btn" onclick="startReply('${msgId}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;margin-bottom:-2px;margin-right:4px"><polyline points="9 14 4 9 9 4"></polyline><path d="M20 20v-7a4 4 0 0 0-4-4H4"></path></svg>REPLY</button>${isSelf && m.type !== 'media' ? `<button class="msg-action-btn edit-btn" onclick="startEdit('${msgId}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;margin-bottom:-2px;margin-right:4px"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>EDIT</button>` : ''}`;
  grp.appendChild(actions);

  // Insert before the sticky button so it stays the last child
  if (btn) list.insertBefore(grp, btn); else list.appendChild(grp);
  lastMsgUID = m.uid;

  msgStore[msgId] = { uid: m.uid, name: m.name, text: m.text || '', colorIdx: m.colorIdx || 0, el: grp };

  // Own messages: scroll already handled by sendMessage/sendMedia — skip to avoid race.
  // Others' messages: smart scroll.
  if (m.uid === myUID) {
    // handled by sendMessage / sendMedia
  } else if (!userScrolledUp) {
    scrollToBottom();
  } else {
    showNewMsgBtn();
  }
}

function scrollToMsg(msgId) {
  const el = document.querySelector(`[data-msg-id="${msgId}"]`);
  if (el) {
    el.scrollIntoView({ behavior:'smooth', block:'center' });
    el.style.outline = '2px solid var(--accent)';
    setTimeout(() => el.style.outline = '', 1200);
  }
}

// ── SIDEBAR (mobile) ──────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

// ── HELPERS ───────────────────────────────────
function setConn(state) {
  const el = document.getElementById('connPill');
  if (!el) return;
  el.className = 'conn-pill ' + state;
  el.textContent = state.toUpperCase();
}

function setInputEnabled(on) {
  document.getElementById('msgInput').disabled = !on;
  document.getElementById('sendBtn').disabled  = !on;
}

function showError(m) { document.getElementById('lobbyError').textContent = m; }

function copyRoomCode() {
  if (!currentRoom) return;
  navigator.clipboard.writeText(currentRoom).then(() => showToast('>> CODE COPIED!'));
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', hour12:true });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── SHARE LINK ────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const roomParam = params.get('room');
  const savedName = sessionStorage.getItem('pixelchat_name');
  const savedRoom = sessionStorage.getItem('pixelchat_room');

  if (roomParam) {
    document.getElementById('roomInput').value = roomParam.toUpperCase();
    const inp = document.getElementById('roomInput');
    inp.style.borderColor = 'var(--yellow)';
    inp.style.boxShadow = 'inset 3px 3px 0 rgba(0,0,0,.4), 0 0 0 2px rgba(255,230,0,.3)';

    if (savedName) {
      document.getElementById('nameInput').value = savedName;
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('chatroom').style.display = 'flex';
      document.querySelectorAll('.roomCodeDisplayVal').forEach(el => el.textContent = roomParam.toUpperCase());
      doJoin(savedName, roomParam.toUpperCase());
    }
  } else if (savedName && savedRoom) {
    document.getElementById('nameInput').value = savedName;
    document.getElementById('roomInput').value = savedRoom;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('chatroom').style.display = 'flex';
    document.querySelectorAll('.roomCodeDisplayVal').forEach(el => el.textContent = savedRoom);
    doJoin(savedName, savedRoom);
  }
});

function getShareLink() {
  if (!currentRoom) return null;
  const base = window.location.origin + window.location.pathname;
  return base + '?room=' + encodeURIComponent(currentRoom);
}

function copyShareLink() {
  const link = getShareLink();
  if (!link) return;
  navigator.clipboard.writeText(link).then(() => showToast('>> SHARE LINK COPIED!'));
}
</script>
